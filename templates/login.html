<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSync - Secure Doctor Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            font-family: var(--font);
            font-size: 1rem;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
            text-align: left;
        }
        
        .alert-success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: var(--success);
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
            text-align: left;
        }
    </style>
</head>
<body>

<section id="login-page" class="page active">
    <div class="login-container">
        <div class="login-card glass-panel animate-fade-in">
            <div class="login-header">
                <i class="fa-solid fa-shield-halved logo-icon"></i>
                <h1>HealthSync Portal</h1>
                <p>Secure Clinical Gateway</p>
            </div>
            
            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 25px;">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <div id="error-msg" class="alert-error"></div>
            <div id="success-msg" class="alert-success"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="tab-content active">
                <div class="form-group">
                    <label for="loginIdentifier">
                        <i class="fa-solid fa-user-doctor"></i> Username or Email
                    </label>
                    <input type="text" id="loginIdentifier" placeholder="Enter username or email" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fa-solid fa-lock"></i> Password
                    </label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fa-solid fa-right-to-bracket"></i> Log In
                </button>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" class="tab-content">
                <div class="form-group">
                    <label for="regUsername">
                        <i class="fa-solid fa-user-doctor"></i> Choose Username
                    </label>
                    <input type="text" id="regUsername" placeholder="e.g. dr.smith" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">
                        <i class="fa-solid fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="regEmail" placeholder="doctor@hospital.com" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">
                        <i class="fa-solid fa-lock"></i> Create Password
                    </label>
                    <input type="password" id="regPassword" placeholder="Minimum 6 characters" required>
                </div>
                <div class="form-group">
                    <label for="regHospital">
                        <i class="fa-solid fa-hospital"></i> Hospital Affiliation
                    </label>
                    <select id="regHospital" required>
                        <option value="" disabled selected>Select Hospital...</option>
                        <option value="Hospital A">Hospital A</option>
                        <option value="Hospital B">Hospital B</option>
                        <option value="Hospital C">Hospital C</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="regDepartment">
                        <i class="fa-solid fa-stethoscope"></i> Department
                    </label>
                    <select id="regDepartment" required>
                        <option value="" disabled selected>Select Department...</option>
                        <option value="general">General Medicine</option>
                        <option value="cardiology">Cardiology</option>
                        <option value="neurology">Neurology</option>
                        <option value="pediatrics">Pediatrics</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fa-solid fa-user-plus"></i> Register Account
                </button>
            </form>
            
        </div>
    </div>
</section>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        if(tab === 'login') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('loginForm').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('registerForm').classList.add('active');
        }
        hideMsgs();
    }

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('success-msg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('success-msg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('error-msg').style.display = 'none';
    }

    function hideMsgs() {
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('success-msg').style.display = 'none';
    }

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        hideMsgs();
        
        const payload = {
            username: document.getElementById('regUsername').value.trim(),
            email: document.getElementById('regEmail').value.trim(),
            password: document.getElementById('regPassword').value,
            hospital: document.getElementById('regHospital').value,
            department: document.getElementById('regDepartment').value
        };

        try {
            const res = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            const data = await res.json();
            
            if(!res.ok) {
                showError(data.detail || "Registration failed");
            } else {
                showSuccess("Registration successful! Please log in.");
                document.getElementById('registerForm').reset();
                setTimeout(() => switchTab('login'), 1500);
            }
        } catch (err) {
            showError("Network error. Is the server running?");
        }
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        hideMsgs();
        
        const payload = {
            identifier: document.getElementById('loginIdentifier').value.trim(),
            password: document.getElementById('loginPassword').value
        };

        try {
            const res = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            const data = await res.json();
            
            if(!res.ok) {
                showError(data.detail || "Login failed");
            } else {
                // Save to local storage for app.js
                localStorage.setItem('healthsync_doctor', JSON.stringify({
                    name: data.doctor.name,
                    hospital: data.doctor.hospital,
                    department: data.doctor.department
                }));
                localStorage.setItem('healthSyncDoctor', data.doctor.name);
                localStorage.setItem('healthSyncHospital', data.doctor.hospital);
                
                window.location.href = '/';
            }
        } catch (err) {
            showError("Network error. Is the server running?");
        }
    });
</script>
</body>
</html>
